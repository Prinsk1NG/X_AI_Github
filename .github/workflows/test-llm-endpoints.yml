name: Test LLM Endpoints

on:
  workflow_dispatch:

jobs:
  run-diagnostics:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run test_llm_endpoints.py
        env:
          KIMI_API_KEY: ${{ secrets.KIMI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: ${{ secrets.OPENROUTER_MODEL || 'claude-2.1' }}
        run: |
          set -eux    # 显示执行的命令并在失败时中止
          echo "Using prompt source: data/2026-03-10 (script will choose newest readable file inside)"
          python3 test_llm_endpoints.py --prompt-file data/2026-03-10 --kmax 3000 --cmax 3000 --save-json
          echo "=== After script run: listing debug_outputs ==="
          ls -la debug_outputs || true
          if [ -f debug_outputs/summary.json ]; then
            echo "=== content of debug_outputs/summary.json ==="
            cat debug_outputs/summary.json
          fi

      - name: Upload debug outputs (optional)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: llm-debug-outputs
          path: debug_outputs/
