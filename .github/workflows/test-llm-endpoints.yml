name: Test LLM Endpoints

on:
  workflow_dispatch:

jobs:
  run-diagnostics:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run test_llm_endpoints.py
        env:
          KIMI_API_KEY: ${{ secrets.KIMI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          python3 test_llm_endpoints.py --prompt-file data/2026-03-10 --kmax 3000 --cmax 3000 --save-json
      - name: Upload debug outputs (optional)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: llm-debug-outputs
          path: debug_outputs/
